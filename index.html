<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjana Gadamsetty · Magical Portfolio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap');

  :root {
    --gold: #f0c040;
    --gold-dim: #a8862a;
    --gold-bright: #ffe066;
    --crimson: #8b1a1a;
    --deep-blue: #0a0a1a;
    --mid-blue: #0d1030;
    --fog: rgba(180,160,120,0.08);
    --glow-gold: 0 0 20px #f0c04088, 0 0 60px #f0c04033;
    --glow-blue: 0 0 30px #4466ff55, 0 0 80px #2244cc22;
    --glow-green: 0 0 20px #44ff8888, 0 0 60px #22cc6633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-blue);
    font-family: 'IM Fell English', serif;
    color: #e8d5a0;
    overflow: hidden;
    cursor: none;
    user-select: none;
  }

  /* Custom Cursor */
  #cursor {
    position: fixed; width: 20px; height: 20px;
    border: 2px solid var(--gold); border-radius: 50%;
    pointer-events: none; z-index: 10000;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, border-color 0.2s, box-shadow 0.2s;
    mix-blend-mode: screen;
  }
  #cursor.hover { transform: translate(-50%,-50%) scale(2.5); border-color: var(--gold-bright); box-shadow: var(--glow-gold); }
  #cursor-trail {
    position: fixed; width: 8px; height: 8px;
    background: var(--gold-dim); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: left 0.15s ease, top 0.15s ease;
    opacity: 0.6;
  }

  /* =================== CANVAS LAYERS =================== */
  /* Hogwarts parallax background canvas - BEHIND everything */
  #hogwarts-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; z-index: -2;
  }

  #world-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; z-index: 0;
  }

  #bg-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; z-index: -1;
  }

  /* =================== HUD =================== */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  #hud-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.1rem; letter-spacing: 0.15em;
    color: var(--gold); text-shadow: var(--glow-gold);
  }
  #hud-name span { color: var(--gold-bright); }

  #controls-hint {
    display: flex; gap: 16px; align-items: center;
    font-size: 0.65rem; letter-spacing: 0.1em;
    color: rgba(240,192,64,0.6);
    font-family: 'Cinzel', serif;
  }
  .key {
    background: rgba(240,192,64,0.12);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 4px; padding: 2px 7px;
    color: var(--gold); font-weight: 600;
  }

  #map-btn {
    background: rgba(240,192,64,0.1);
    border: 1px solid var(--gold-dim);
    color: var(--gold); border-radius: 8px;
    padding: 8px 18px; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 0.75rem;
    letter-spacing: 0.12em; transition: all 0.3s;
    box-shadow: var(--glow-gold);
  }
  #map-btn:hover { background: rgba(240,192,64,0.25); transform: scale(1.05); }

  #mobile-controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 110;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: auto;
    user-select: none;
  }

  #mobile-controls .mobile-control-row {
    display: flex;
    gap: 10px;
  }

  .mobile-control-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid rgba(240,192,64,0.5);
    background: rgba(20,18,40,0.72);
    color: var(--gold);
    font-size: 1.3rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.2s, box-shadow 0.2s;
    touch-action: none;
  }

  .mobile-control-btn:active,
  .mobile-control-btn.active {
    background: rgba(255,192,96,0.45);
    box-shadow: 0 0 15px rgba(240,192,64,0.7);
    transform: scale(0.94);
  }

  .mobile-control-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: rgba(240,192,64,0.8);
    font-family: 'Cinzel', serif;
    text-align: center;
  }

  @media (max-width: 900px) {
    #controls-hint { display: none; }
    #mobile-controls { display: flex; bottom: calc(env(safe-area-inset-bottom, 12px) + 14px); }
    #mobile-controls .mobile-control-row { flex-wrap: wrap; gap: 8px; }
    .mobile-control-btn { width: 48px; height: 48px; font-size: 1.1rem; }
    .mobile-control-label { font-size: 0.62rem; }
    #hud { padding: 12px 16px; }
  }

  /* =================== PROGRESS BAR =================== */
  #progress-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
  }
  .prog-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(240,192,64,0.25);
    border: 1px solid rgba(240,192,64,0.4);
    cursor: pointer; transition: all 0.3s;
  }
  .prog-dot.active { background: var(--gold); box-shadow: var(--glow-gold); transform: scale(1.4); }

  /* =================== SECTION LABEL =================== */
  #section-label {
    position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
    font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.2em;
    color: var(--gold); text-shadow: var(--glow-gold);
    opacity: 0; transition: opacity 0.5s;
    pointer-events: none; text-align: center;
  }
  #section-label.visible { opacity: 1; }

  /* =================== START OVERLAY =================== */
  #start-overlay {
    position: fixed; inset: 0; z-index: 500;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1020 0%, #05050f 70%);
    transition: opacity 1.5s ease;
  }

  .platform-steam {
    position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
    background: linear-gradient(to top, rgba(180,160,100,0.15), transparent);
    filter: blur(20px);
    animation: steamRise 4s ease-in-out infinite alternate;
  }

  @keyframes steamRise {
    from { opacity: 0.4; transform: translateY(0); }
    to { opacity: 0.8; transform: translateY(-10px); }
  }

  .start-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 5vw, 4rem);
    color: var(--gold-bright);
    text-shadow: 0 0 40px #f0c04099, 0 0 100px #f0c04044;
    letter-spacing: 0.1em; text-align: center;
    animation: titleFloat 3s ease-in-out infinite alternate;
    margin-bottom: 12px;
  }

  @keyframes titleFloat {
    from { transform: translateY(0); text-shadow: 0 0 40px #f0c04099; }
    to { transform: translateY(-8px); text-shadow: 0 0 60px #f0c040cc, 0 0 120px #f0c04066; }
  }

  .start-subtitle {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 1.1rem; color: rgba(240,192,64,0.7);
    letter-spacing: 0.08em; margin-bottom: 60px; text-align: center;
  }

  .platform-label {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    letter-spacing: 0.3em; color: rgba(240,192,64,0.5);
    margin-bottom: 30px;
  }

  #start-btn {
    background: transparent;
    border: 2px solid var(--gold);
    color: var(--gold-bright);
    font-family: 'Cinzel', serif; font-size: 1rem;
    letter-spacing: 0.2em; padding: 16px 48px;
    cursor: pointer; border-radius: 4px;
    box-shadow: var(--glow-gold), inset 0 0 30px rgba(240,192,64,0.05);
    transition: all 0.4s;
    animation: btnPulse 2s ease-in-out infinite alternate;
    position: relative; overflow: hidden;
  }

  #start-btn::before {
    content: '⚡'; position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    font-size: 1.2rem;
  }
  #start-btn::after {
    content: '⚡'; position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
    font-size: 1.2rem;
  }

  @keyframes btnPulse {
    from { box-shadow: var(--glow-gold), inset 0 0 30px rgba(240,192,64,0.05); }
    to { box-shadow: 0 0 40px #f0c040aa, 0 0 100px #f0c04055, inset 0 0 50px rgba(240,192,64,0.1); }
  }

  #start-btn:hover { transform: scale(1.08); background: rgba(240,192,64,0.15); }

  .start-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .sp {
    position: absolute; border-radius: 50%;
    animation: spFloat linear infinite;
  }
  @keyframes spFloat {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
  }

  /* =================== SECTION OVERLAY =================== */
  #section-overlay {
    position: fixed; inset: 0; z-index: 300;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0);
    backdrop-filter: blur(0px);
    transition: background 0.5s, backdrop-filter 0.5s;
    overflow-y: auto;
  }
  #section-overlay.visible {
    display: flex;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px);
  }

  .section-panel {
    background: linear-gradient(135deg, rgba(15,10,30,0.97) 0%, rgba(25,15,50,0.95) 100%);
    border: 1px solid rgba(240,192,64,0.3);
    border-radius: 16px; padding: 50px 60px;
    max-width: 780px; width: 90%; position: relative;
    box-shadow: 0 0 80px rgba(240,192,64,0.15), 0 0 200px rgba(240,192,64,0.05);
    transform: scale(0.9) translateY(20px);
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 90vh; overflow-y: auto;
  }
  .section-panel.open { transform: scale(1) translateY(0); }

  .panel-close {
    position: absolute; top: 20px; right: 24px;
    background: none; border: none; color: var(--gold-dim);
    font-size: 1.8rem; cursor: pointer; line-height: 1;
    transition: color 0.2s, transform 0.2s;
  }
  .panel-close:hover { color: var(--gold-bright); transform: rotate(90deg) scale(1.2); }

  .panel-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem; color: var(--gold-bright);
    text-shadow: var(--glow-gold); margin-bottom: 6px;
  }
  .panel-subtitle {
    font-family: 'Cinzel', serif; font-size: 0.75rem;
    letter-spacing: 0.25em; color: var(--gold-dim);
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid rgba(240,192,64,0.2);
  }

  .panel-body { line-height: 1.85; color: rgba(232,213,160,0.9); font-size: 0.95rem; }

  .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 16px; }
  .skill-cat { background: rgba(240,192,64,0.05); border: 1px solid rgba(240,192,64,0.15); border-radius: 10px; padding: 20px; }
  .skill-cat h4 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.8rem; letter-spacing: 0.15em; margin-bottom: 12px; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag {
    background: rgba(240,192,64,0.1); border: 1px solid rgba(240,192,64,0.25);
    border-radius: 20px; padding: 4px 14px; font-size: 0.8rem;
    color: var(--gold); transition: all 0.3s; cursor: default;
  }
  .skill-tag:hover { background: rgba(240,192,64,0.25); box-shadow: 0 0 15px rgba(240,192,64,0.3); }

  .project-card {
    display: block;
    background: rgba(240,192,64,0.04); border: 1px solid rgba(240,192,64,0.2);
    border-radius: 12px; padding: 24px; margin-bottom: 20px;
    transition: all 0.3s; cursor: pointer; text-decoration: none;
    color: inherit;
  }
  .project-card:hover { background: rgba(240,192,64,0.08); border-color: var(--gold-dim); transform: translateY(-2px); box-shadow: var(--glow-gold); }
  .project-card h3 { font-family: 'Cinzel', serif; color: var(--gold-bright); font-size: 1.1rem; margin-bottom: 6px; }
  .project-card .potion-name { font-family: 'IM Fell English', serif; font-style: italic; color: var(--gold-dim); font-size: 0.85rem; margin-bottom: 10px; }
  .project-card p { font-size: 0.88rem; line-height: 1.7; }

  .cert-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 0; border-bottom: 1px solid rgba(240,192,64,0.1);
  }
  .cert-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
  .cert-item h4 { font-family: 'Cinzel', serif; font-size: 0.85rem; color: var(--gold); margin-bottom: 3px; }
  .cert-item p { font-size: 0.8rem; color: rgba(232,213,160,0.6); }

  .timeline { position: relative; padding-left: 30px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--gold-dim), transparent); }
  .timeline-item { position: relative; padding: 0 0 28px 20px; }
  .timeline-item::before { content: ''; position: absolute; left: -26px; top: 6px; width: 12px; height: 12px; border-radius: 50%; background: var(--gold); box-shadow: var(--glow-gold); }
  .timeline-item h4 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.85rem; }
  .timeline-item .year { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: var(--gold-bright); }

  .stat-links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 16px; }
  .stat-link {
    display: flex; align-items: center; gap: 14px;
    background: rgba(240,192,64,0.05); border: 1px solid rgba(240,192,64,0.2);
    border-radius: 10px; padding: 16px 20px;
    text-decoration: none; color: var(--gold);
    font-family: 'Cinzel', serif; font-size: 0.82rem; letter-spacing: 0.08em;
    transition: all 0.3s;
  }
  .stat-link:hover { background: rgba(240,192,64,0.15); transform: translateY(-2px); box-shadow: var(--glow-gold); }
  .stat-link .link-icon { font-size: 1.6rem; }

  .contact-btns { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; }
  .contact-btn {
    flex: 1; min-width: 160px;
    background: transparent; border: 2px solid var(--gold-dim);
    color: var(--gold); padding: 14px 28px; border-radius: 8px;
    font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.12em;
    cursor: pointer; transition: all 0.3s; text-decoration: none; display: flex;
    align-items: center; justify-content: center; gap: 8px;
  }
  .contact-btn:hover { background: rgba(240,192,64,0.15); border-color: var(--gold); box-shadow: var(--glow-gold); transform: translateY(-2px); }
  .contact-btn.primary { background: rgba(240,192,64,0.1); border-color: var(--gold); }

  /* =================== MARAUDER'S MAP =================== */
  #map-overlay {
    position: fixed; inset: 0; z-index: 400;
    display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(20px);
  }
  #map-overlay.visible { display: flex; }

  #map-panel {
    width: min(900px, 95vw); height: min(650px, 90vh);
    display: grid; place-items: center;
    background: radial-gradient(ellipse at center, #2a1e0a 0%, #1a1005 60%, #0d0802 100%);
    border: 3px solid var(--gold-dim);
    border-radius: 12px; position: relative; overflow: hidden;
    box-shadow: 0 0 100px rgba(240,192,64,0.3), inset 0 0 100px rgba(0,0,0,0.5);
  }

  #map-panel::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23a8862a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.4;
  }

  #map-title {
    position: absolute; top: 20px; left: 0; right: 0; text-align: center;
    font-family: 'Cinzel Decorative', serif; font-size: 1.4rem;
    color: var(--gold-dim); letter-spacing: 0.15em;
    text-shadow: 0 0 20px rgba(168,134,42,0.5);
  }
  #map-title small { display: block; font-size: 0.55rem; letter-spacing: 0.35em; margin-top: 4px; font-family: 'IM Fell English', serif; font-style: italic; }

  #map-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none; color: var(--gold-dim);
    font-size: 1.6rem; cursor: pointer; z-index: 10; transition: color 0.2s;
  }
  #map-close:hover { color: var(--gold-bright); }

  #map-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

  /* =================== SPEED INDICATOR =================== */
  #speed-bar {
    position: fixed; bottom: 50px; right: 30px; z-index: 100;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #speed-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.15em; color: rgba(240,192,64,0.5); }
  #speed-indicator {
    width: 6px; height: 60px;
    background: rgba(240,192,64,0.1); border: 1px solid rgba(240,192,64,0.2);
    border-radius: 3px; overflow: hidden; position: relative;
  }
  #speed-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--gold), var(--gold-bright));
    border-radius: 3px; transition: height 0.1s;
    box-shadow: 0 0 10px rgba(240,192,64,0.6);
  }

  /* =================== TOAST =================== */
  #toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(15,10,30,0.95); border: 1px solid var(--gold-dim);
    color: var(--gold); padding: 10px 24px; border-radius: 30px;
    font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.12em;
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.4s; box-shadow: var(--glow-gold);
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(240,192,64,0.05); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 3px; }

  /* =================== AMBIENT EFFECTS =================== */
  #fog-layer {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(100,80,40,0.12) 0%, transparent 70%);
  }

  #vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.7) 100%);
  }
</style>
</head>
<body>

<div id="fog-layer"></div>
<div id="vignette"></div>

<div id="cursor"></div>
<div id="cursor-trail"></div>

<!-- Hogwarts parallax background - rendered first (lowest z-index) -->
<canvas id="hogwarts-canvas"></canvas>

<!-- Particle/effect canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Main game canvas -->
<canvas id="world-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-name">✦ <span>SANJANA</span> GADAMSETTY</div>
  <div id="controls-hint">
    <span class="key">A</span><span class="key">D</span> or <span class="key">←</span><span class="key">→</span> to fly &nbsp;
    <span class="key">W</span><span class="key">S</span> altitude &nbsp;
    <span class="key">Space</span> boost &nbsp;
    <span class="key">M</span> Map
  </div>
  <button id="map-btn">🗺 MARAUDER'S MAP</button>
</div>

<div id="mobile-controls">
  <button id="mobile-up" class="mobile-control-btn" aria-label="Up">⬆</button>
  <div class="mobile-control-row">
    <button id="mobile-left" class="mobile-control-btn" aria-label="Left">⬅</button>
    <button id="mobile-down" class="mobile-control-btn" aria-label="Down">⬇</button>
    <button id="mobile-right" class="mobile-control-btn" aria-label="Right">➡</button>
  </div>
  <div class="mobile-control-label">Touch to fly: forward/backward/up/down</div>
</div>

<div id="section-label"></div>
<div id="progress-bar"></div>

<div id="speed-bar">
  <div id="speed-indicator"><div id="speed-fill" style="height:20%"></div></div>
  <div id="speed-label">SPEED</div>
</div>

<div id="toast"></div>

<!-- =================== START OVERLAY =================== -->
<div id="start-overlay">
  <div class="start-particles" id="start-particles"></div>
  <div class="platform-steam"></div>
  <div class="platform-label">✦ PLATFORM 9¾ ✦</div>
  <div class="start-title">Sanjana Gadamsetty</div>

// ======================================================
// HOGWARTS PARALLAX BACKGROUND ENGINE
// ======================================================
const hCanvas = document.getElementById('hogwarts-canvas');
const hCtx = hCanvas.getContext('2d');

function resizeHCanvas() {
  hCanvas.width = window.innerWidth;
  hCanvas.height = window.innerHeight;
}
resizeHCanvas();
window.addEventListener('resize', resizeHCanvas);

// Parallax layers: each has a speed multiplier (0=static, 1=moves with world)
// We'll draw Hogwarts castle using pure canvas art across multiple parallax layers

// ---- LAYER 0: Moon & sky gradient (barely moves) ----
// ---- LAYER 1: Distant mountains (slow) ----
// ---- LAYER 2: Hogwarts castle silhouette (medium) ----
// ---- LAYER 3: Foreground hills/trees (fast) ----

const PARALLAX = [0.02, 0.07, 0.18, 0.45]; // each layer's scroll speed factor

// Precompute some random trees/rocks for foreground
const fgTrees = [];
for(let i=0;i<120;i++) {
  fgTrees.push({
    wx: Math.random() * 12000 - 2000,
    type: Math.random() < 0.6 ? 'pine' : 'dead',
    h: 30 + Math.random() * 70,
    w: 15 + Math.random() * 25,
    side: Math.random() < 0.5 ? 'bottom' : 'top'
  });
}
// Mid layer rocks & ruins
const midRocks = [];
for(let i=0;i<40;i++) {
  midRocks.push({
    wx: Math.random() * 12000 - 1000,
    w: 20+Math.random()*50,
    h: 15+Math.random()*35
  });
}

// Draw a single spire/tower
function drawTower(ctx, x, baseY, w, h, hasTurret=true, windowGlow='#f0c040') {
  // Main body
  ctx.fillRect(x - w/2, baseY - h, w, h);
  // Battlements
  if(hasTurret) {
    const mw = w/5, count = Math.floor(w/mw);
    for(let i=0;i<count;i++) {
      if(i%2===0) ctx.fillRect(x - w/2 + i*mw, baseY - h - mw*1.5, mw, mw*1.5);
    }
    // Conical roof
    ctx.beginPath();
    ctx.moveTo(x - w/2 - 5, baseY - h);
    ctx.lineTo(x, baseY - h - w*1.1);
    ctx.lineTo(x + w/2 + 5, baseY - h);
    ctx.closePath();
    ctx.fill();
  }
  // Windows with glow
  const winH = h * 0.08;
  const winW = w * 0.2;
  const rows = Math.floor(h / 35);
  for(let row=0; row<rows; row++) {
    const wy = baseY - h + 20 + row*35;
    for(let col=0; col<2; col++) {
      const wx2 = x - w*0.2 + col * w*0.35;
      ctx.save();
      ctx.shadowBlur = 8; ctx.shadowColor = windowGlow;
      ctx.fillStyle = windowGlow + 'bb';
      // Arched window
      ctx.beginPath();
      ctx.rect(wx2, wy, winW, winH);
      ctx.arc(wx2 + winW/2, wy, winW/2, Math.PI, 0);
      ctx.fill();
      ctx.restore();
    }
  }
}

// ======================================================
// REALISTIC OWL WITH WING FLAPPING
// ======================================================
function drawFlyingOwl(ctx, x, y, t, owlIndex) {
  ctx.save();
  ctx.translate(x, y);

  // Wing flapping cycle (2 beats per second)
  const flapCycle = Math.sin(t * 0.02 + owlIndex * Math.PI) * 0.5 + 0.5;
  const wingAngle = flapCycle * Math.PI * 0.8 - Math.PI * 0.4; // -40° to +40°

  // Slight body bob with flight
  const bodyBob = Math.sin(t * 0.015 + owlIndex * 1.5) * 2;

  // Owl body (rounded rectangle)
  ctx.fillStyle = '#8B4513'; // Brown body
  ctx.beginPath();
  ctx.roundRect(-8, -5 + bodyBob, 16, 12, 6);
  ctx.fill();

  // Owl head (circle)
  ctx.fillStyle = '#D2B48C'; // Tan head
  ctx.beginPath();
  ctx.arc(0, -8 + bodyBob, 6, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (yellow with black pupils)
  ctx.fillStyle = '#FFD700'; // Gold eyes
  ctx.beginPath();
  ctx.arc(-2, -9 + bodyBob, 2, 0, Math.PI * 2);
  ctx.arc(2, -9 + bodyBob, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#000000'; // Black pupils
  ctx.beginPath();
  ctx.arc(-2, -9 + bodyBob, 1, 0, Math.PI * 2);
  ctx.arc(2, -9 + bodyBob, 1, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#FFA500'; // Orange beak
  ctx.beginPath();
  ctx.moveTo(0, -6 + bodyBob);
  ctx.lineTo(-1, -4 + bodyBob);
  ctx.lineTo(1, -4 + bodyBob);
  ctx.closePath();
  ctx.fill();

  // Left wing (animated)
  ctx.save();
  ctx.translate(-6, -2 + bodyBob);
  ctx.rotate(wingAngle);
  ctx.fillStyle = '#654321'; // Dark brown wing
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing feathers
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 1;
  for(let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-8 + i * 3, -2);
    ctx.lineTo(-8 + i * 3, 2);
    ctx.stroke();
  }
  ctx.restore();

  // Right wing (animated, opposite phase)
  ctx.save();
  ctx.translate(6, -2 + bodyBob);
  ctx.rotate(-wingAngle); // Opposite wing flaps opposite
  ctx.fillStyle = '#654321'; // Dark brown wing
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing feathers
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 1;
  for(let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(8 - i * 3, -2);
    ctx.lineTo(8 - i * 3, 2);
    ctx.stroke();
  }
  ctx.restore();

  // Tail feathers
  ctx.fillStyle = '#654321';
  ctx.beginPath();
  ctx.ellipse(0, 8 + bodyBob, 4, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Draw the full Hogwarts scene onto hCtx given current worldX
function drawHogwarts(t) {
  const W = hCanvas.width, H = hCanvas.height;
  hCtx.clearRect(0, 0, W, H);

  // ----------- LAYER 0: Sky gradient + moon -----------
  const skyGrad = hCtx.createLinearGradient(0, 0, 0, H * 0.75);
  skyGrad.addColorStop(0, '#020412');
  skyGrad.addColorStop(0.3, '#08102a');
  skyGrad.addColorStop(0.6, '#10183c');
  skyGrad.addColorStop(1, '#1a1220');
  hCtx.fillStyle = skyGrad;
  hCtx.fillRect(0, 0, W, H);

  // Stars (fixed, no parallax) - reduced by 40%
  hCtx.save();
  for(let i=0; i<120; i++) {
    const sx = ((i * 173.7) % W);
    const sy = ((i * 97.3) % (H * 0.72));
    const bright = 0.4 + 0.6 * Math.abs(Math.sin(i + t * 0.00015));
    hCtx.globalAlpha = bright * 0.8;
    hCtx.fillStyle = i % 5 === 0 ? '#ffd0a0' : '#c0d0ff';
    hCtx.beginPath();
    hCtx.arc(sx, sy, i % 7 === 0 ? 1.5 : 0.7, 0, Math.PI*2);
    hCtx.fill();
  }
  hCtx.restore();

  // Moon (very slow parallax)
  const moonOffX = worldX * PARALLAX[0];
  const moonX = W * 0.75 - (moonOffX % (W * 2)) + W * 0.1;
  const moonY = H * 0.18;
  hCtx.save();
  // Moon glow
  const moonGlow = hCtx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 120);
  moonGlow.addColorStop(0, 'rgba(200,220,255,0.12)');
  moonGlow.addColorStop(0.4, 'rgba(180,200,255,0.06)');
  moonGlow.addColorStop(1, 'transparent');
  hCtx.fillStyle = moonGlow;
  hCtx.beginPath(); hCtx.arc(moonX, moonY, 120, 0, Math.PI*2); hCtx.fill();
  // Moon disc
  hCtx.shadowBlur = 30; hCtx.shadowColor = '#c8d8ff';
  const moonGrad = hCtx.createRadialGradient(moonX-8, moonY-8, 2, moonX, moonY, 45);
  moonGrad.addColorStop(0, '#f0f0ff');
  moonGrad.addColorStop(0.6, '#c8d0ff');
  moonGrad.addColorStop(1, '#a0b0e0');
  hCtx.fillStyle = moonGrad;
  hCtx.beginPath(); hCtx.arc(moonX, moonY, 45, 0, Math.PI*2); hCtx.fill();
  // Moon craters
  hCtx.globalAlpha = 0.15; hCtx.fillStyle = '#8090c0';
  [[12,-8,6],[-15,5,4],[5,18,3],[-5,-20,5]].forEach(([cx,cy,r])=>{
    hCtx.beginPath(); hCtx.arc(moonX+cx, moonY+cy, r, 0, Math.PI*2); hCtx.fill();
  });
  hCtx.restore();

  // ----------- LAYER 1: Distant mountains (very slow) -----------
  const mOff = worldX * PARALLAX[1];
  hCtx.save();
  hCtx.fillStyle = '#0d1528';

  // Far mountain range (repeating)
  const mPeriod = W * 3;
  const mStart = -((mOff % mPeriod)) - mPeriod;
  for(let rep=0; rep<4; rep++) {
    const ox = mStart + rep * mPeriod;
    hCtx.beginPath();
    hCtx.moveTo(ox, H);
    hCtx.lineTo(ox + W*0.1, H*0.52);
    hCtx.lineTo(ox + W*0.18, H*0.62);
    hCtx.lineTo(ox + W*0.28, H*0.44);
    hCtx.lineTo(ox + W*0.38, H*0.58);
    hCtx.lineTo(ox + W*0.50, H*0.40);
    hCtx.lineTo(ox + W*0.62, H*0.55);
    hCtx.lineTo(ox + W*0.72, H*0.46);
    hCtx.lineTo(ox + W*0.82, H*0.60);
    hCtx.lineTo(ox + W*0.90, H*0.50);
    hCtx.lineTo(ox + W*1.00, H*0.58);
    hCtx.lineTo(ox + W*1.10, H);
    hCtx.closePath();
    hCtx.fill();
  }
  // Snow caps
  hCtx.fillStyle = 'rgba(200,215,255,0.08)';
  for(let rep=0; rep<4; rep++) {
    const ox = mStart + rep * mPeriod;
    [[W*0.28,H*0.44,W*0.05],[W*0.50,H*0.40,W*0.06],[W*0.72,H*0.46,W*0.04]].forEach(([px,py,pw])=>{
      hCtx.beginPath();
      hCtx.moveTo(ox+px-pw, py+pw*0.6);
      hCtx.lineTo(ox+px, py);
      hCtx.lineTo(ox+px+pw, py+pw*0.6);
      hCtx.closePath(); hCtx.fill();
    });
  }
  hCtx.restore();

  // ----------- LAYER 2: Hogwarts Castle (medium speed) -----------
  const castleOff = worldX * PARALLAX[2];
  // Castle base Y
  const castleBaseY = H * 0.82;
  // Castle spans a huge width — we tile it somewhat
  const castleWidth = W * 2.5;
  const castlePeriod = W * 6;
  const castleStartX = W * 0.5 - (castleOff % castlePeriod);

  hCtx.save();

  // Draw castle at multiple positions for seamless tiling
  for(let rep = -1; rep <= 2; rep++) {
    const cox = castleStartX + rep * castlePeriod;
    if(cox + castleWidth < -100 || cox > W + 100) continue;
    drawHogwardsCastle(hCtx, cox, castleBaseY, castleWidth, H, t);
  }

  hCtx.restore();

  // ----------- LAYER 3: Foreground trees + rocks (fastest) -----------
  const fgOff = worldX * PARALLAX[3];
  const fgH = H;

  hCtx.save();

  // Foreground hills
  hCtx.fillStyle = '#05080e';
  const hillPeriod = W * 1.8;
  const hillStart = -((fgOff * 0.6) % hillPeriod) - hillPeriod;
  for(let rep=0; rep<5; rep++) {
    const ox = hillStart + rep * hillPeriod;
    hCtx.beginPath();
    hCtx.moveTo(ox, fgH);
    hCtx.bezierCurveTo(ox + W*0.3, fgH*0.78, ox + W*0.5, fgH*0.72, ox + W*0.7, fgH*0.80);
    hCtx.bezierCurveTo(ox + W*0.85, fgH*0.85, ox + W*1.0, fgH*0.75, ox + W*1.2, fgH*0.82);
    hCtx.lineTo(ox + W*1.2, fgH);
    hCtx.closePath();
    hCtx.fill();
  }

  // Trees (only bottom trees, top trees removed)
  fgTrees.forEach(tree => {
    // Skip top trees as requested
    if(tree.side === 'top') return;

    const sx = tree.wx - fgOff;
    if(sx < -200 || sx > W + 200) return;
    const baseY = tree.side === 'bottom' ? H * 0.85 : H * 0.12;
    const flip = tree.side === 'top' ? -1 : 1;

    hCtx.save();
    hCtx.translate(sx, baseY);
    hCtx.scale(1, flip);

    if(tree.type === 'pine') {
      // Pine trunk
      hCtx.fillStyle = '#1a100a';
      hCtx.fillRect(-tree.w*0.08, 0, tree.w*0.16, tree.h*0.3);
      // Pine layers
      const layers = 4;
      for(let l=0;l<layers;l++) {
        const ly = -tree.h*(0.15 + l*0.22);
        const lw = tree.w*(0.5 - l*0.08);
        hCtx.fillStyle = l%2===0 ? '#0a1a0e' : '#081408';
        hCtx.beginPath();
        hCtx.moveTo(-lw, ly + tree.h*0.18);
        hCtx.lineTo(0, ly - tree.h*0.12);
        hCtx.lineTo(lw, ly + tree.h*0.18);
        hCtx.closePath(); hCtx.fill();
      }
    } else {
      // Dead/bare tree
      hCtx.strokeStyle = '#111';
      hCtx.lineWidth = tree.w*0.12;
      hCtx.lineCap = 'round';
      hCtx.beginPath();
      hCtx.moveTo(0,0); hCtx.lineTo(0,-tree.h);
      hCtx.stroke();
      // Branches
      for(let b=0;b<4;b++) {
        const bh = -tree.h*(0.4 + b*0.15);
        const bdir = b%2===0 ? 1 : -1;
        hCtx.lineWidth = tree.w*0.06;
        hCtx.beginPath();
        hCtx.moveTo(0,bh);
        hCtx.lineTo(bdir*tree.w*0.6, bh - tree.h*0.15);
        hCtx.stroke();
      }
    }
    hCtx.restore();
  });

  // Foreground rocks
  midRocks.forEach(rock => {
    const sx = rock.wx - fgOff;
    if(sx < -200 || sx > W + 200) return;
    hCtx.fillStyle = '#0a0c12';
    hCtx.beginPath();
    hCtx.ellipse(sx, H * 0.88, rock.w/2, rock.h/2, 0, 0, Math.PI*2);
    hCtx.fill();
  });

  hCtx.restore();

  // Ground base
  hCtx.save();
  const groundGrad = hCtx.createLinearGradient(0, H*0.85, 0, H);
  groundGrad.addColorStop(0, '#050810');
  groundGrad.addColorStop(1, '#030508');
  hCtx.fillStyle = groundGrad;
  hCtx.fillRect(0, H*0.85, W, H*0.15);
  hCtx.restore();

  // Atmospheric fog at bottom
  hCtx.save();
  const fogGrad = hCtx.createLinearGradient(0, H*0.68, 0, H*0.85);
  fogGrad.addColorStop(0, 'transparent');
  fogGrad.addColorStop(0.5, 'rgba(30,20,50,0.3)');
  fogGrad.addColorStop(1, 'rgba(10,8,20,0.6)');
  hCtx.fillStyle = fogGrad;
  hCtx.fillRect(0, H*0.68, W, H*0.17);
  hCtx.restore();

  // ----------- DIMMING OVERLAY: Make background less bright for better visibility -----------
  hCtx.save();
  hCtx.globalAlpha = 0.25; // 25% opacity dark overlay for subtle dimming
  hCtx.fillStyle = '#000000';
  hCtx.fillRect(0, 0, W, H);
  hCtx.restore();
}

// Draw the full Hogwarts castle procedurally
function drawHogwardsCastle(ctx, ox, baseY, totalW, H, t) {
  const windowGlow = `hsl(${45 + Math.sin(t*0.001)*10},80%,70%)`;

  ctx.fillStyle = '#0e1220';

  // ---- Main curtain wall ----
  const wallH = totalW * 0.09;
  ctx.fillRect(ox, baseY - wallH, totalW, wallH);
  // Battlements on wall
  const merlonW = 18, merlonH = 14, gap = 12;
  for(let mx = ox; mx < ox + totalW; mx += merlonW + gap) {
    ctx.fillRect(mx, baseY - wallH - merlonH, merlonW, merlonH);
  }

  // ---- Towers ----
  // Define towers: [relX (0-1), w, h, hasTurret, windowColor]
  const towers = [
    [0.04, 55, totalW*0.24, true, '#f0c040'],   // Far left — tallest (Astronomy Tower)
    [0.12, 38, totalW*0.18, true, '#f0a030'],
    [0.22, 30, totalW*0.14, false, '#e09020'],
    [0.32, 45, totalW*0.22, true, '#ffe066'],   // Central keep cluster
    [0.40, 60, totalW*0.30, true, '#f0c040'],   // The Great Hall tower
    [0.50, 35, totalW*0.16, true, '#c0a020'],
    [0.58, 50, totalW*0.26, true, '#f0c040'],   // Clock tower area
    [0.66, 28, totalW*0.12, false, '#d0a030'],
    [0.74, 42, totalW*0.20, true, '#f0c040'],
    [0.82, 33, totalW*0.15, true, '#e0b030'],
    [0.90, 48, totalW*0.22, true, '#f0c040'],
    [0.96, 32, totalW*0.14, false, '#c09020'],
  ];

  towers.forEach(([relX, w, h, hasTurret, wc]) => {
    const tx = ox + relX * totalW;
    ctx.fillStyle = '#0d1320';
    drawTower(ctx, tx, baseY, w, h, hasTurret, wc);
  });

  // ---- The Great Hall (prominent central structure) ----
  const ghX = ox + totalW * 0.38;
  const ghW = totalW * 0.14;
  const ghH = totalW * 0.19;
  ctx.fillStyle = '#0b1018';
  ctx.fillRect(ghX, baseY - ghH, ghW, ghH);

  // Great Hall roof (Gothic arch style)
  ctx.beginPath();
  ctx.moveTo(ghX - 10, baseY - ghH);
  ctx.lineTo(ghX + ghW/2, baseY - ghH - ghH*0.35);
  ctx.lineTo(ghX + ghW + 10, baseY - ghH);
  ctx.closePath();
  ctx.fillStyle = '#0a0e18';
  ctx.fill();

  // Great Hall windows — large Gothic stained glass glow
  const ghWinH = ghH * 0.5;
  const ghWinW = ghW * 0.15;
  const ghWinCount = 4;
  for(let i=0;i<ghWinCount;i++) {
    const wx2 = ghX + ghW*0.1 + i*(ghW*0.2);
    const wy = baseY - ghH + ghH*0.1;
    ctx.save();
    ctx.shadowBlur = 20;
    ctx.shadowColor = i%2===0 ? '#f0c040' : '#ff8040';
    ctx.fillStyle = (i%2===0 ? '#f0c040' : '#ff9050') + 'cc';
    ctx.fillRect(wx2, wy, ghWinW, ghWinH);
    // Arch top
    ctx.beginPath();
    ctx.arc(wx2 + ghWinW/2, wy, ghWinW/2, Math.PI, 0);
    ctx.fill();
    ctx.restore();
  }

  // ---- Connecting bridges / walkways ----
  ctx.fillStyle = '#0c1018';
  [[0.15, 0.22, 0.04], [0.30, 0.40, 0.05], [0.55, 0.63, 0.04], [0.70, 0.80, 0.04]].forEach(([r1,r2,rh]) => {
    const bx1 = ox + r1*totalW, bx2 = ox + r2*totalW;
    const bh = totalW*rh;
    const by = baseY - bh;
    ctx.fillRect(bx1, by, bx2-bx1, bh);
    // Arch below bridge
    ctx.save();
    ctx.fillStyle = '#07090f';
    ctx.beginPath();
    ctx.arc((bx1+bx2)/2, by+bh, (bx2-bx1)*0.3, 0, Math.PI);
    ctx.fill();
    ctx.restore();
  });

  // ---- Boathouse / Dungeon at far left ----
  ctx.fillStyle = '#080c14';
  ctx.fillRect(ox + totalW*0.0, baseY - totalW*0.07, totalW*0.06, totalW*0.07);

  // ---- Reflection in water (at very bottom) ----
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.scale(1, -0.3);
  ctx.translate(0, -(baseY*2 + 50) / 0.3);
  ctx.fillStyle = '#0e1220';
  ctx.fillRect(ox, baseY - wallH, totalW, wallH);
  towers.forEach(([relX, w, h]) => {
    const tx = ox + relX * totalW;
    ctx.fillRect(tx - w/2, baseY - h, w, h);
  });
  ctx.restore();

  // ---- Lit torch sconces on walls ----
  const torchFlicker = 0.85 + 0.15 * Math.sin(t * 0.004 + ox);
  for(let i=0; i<12; i++) {
    const tx = ox + totalW * (0.05 + i * 0.083);
    const ty = baseY - wallH - 25;
    ctx.save();
    ctx.shadowBlur = 20 * torchFlicker;
    ctx.shadowColor = '#ff8020';
    ctx.fillStyle = `rgba(255,140,40,${0.6*torchFlicker})`;
    ctx.beginPath();
    ctx.arc(tx, ty, 4, 0, Math.PI*2);
    ctx.fill();
    // flame
    ctx.fillStyle = `rgba(255,200,50,${0.8*torchFlicker})`;
    ctx.beginPath();
    ctx.ellipse(tx, ty-6, 2.5, 5, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ---- The Black Lake (water at bottom) ----
  ctx.save();
  const lakeGrad = ctx.createLinearGradient(ox, baseY, ox, baseY+60);
  lakeGrad.addColorStop(0, 'rgba(10,15,35,0.9)');
  lakeGrad.addColorStop(1, 'rgba(5,8,18,0)');
  ctx.fillStyle = lakeGrad;
  ctx.fillRect(ox, baseY, totalW, 60);
  // Ripple lines
  ctx.strokeStyle = 'rgba(240,192,64,0.08)';
  ctx.lineWidth = 1;
  for(let r=0;r<5;r++) {
    const ry = baseY + 10 + r*10;
    const rw = totalW * (0.3 + r*0.1);
    const rx = ox + (totalW - rw)/2 + Math.sin(t*0.001 + r)*15;
    ctx.beginPath();
    ctx.ellipse(rx + rw/2, ry, rw/2, 3, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.restore();

  // ---- Owls flying across ----
  const numOwls = 3;
  for(let o=0;o<numOwls;o++) {
    const owlT = ((t * 0.00015 + o * 0.33) % 1);
    const owlX = ox + owlT * (totalW + 200) - 100;
    const owlY = baseY - totalW*0.35 - Math.sin(owlT*Math.PI*4)*30 + o*40;
    if(owlX < -50 || owlX > W + 50) continue;
    ctx.save();
    ctx.globalAlpha = 0.6;
    ctx.font = '18px serif';
    ctx.fillText('🦉', owlX, owlY);
    ctx.restore();
  }
}

// MAIN CANVAS ENGINE
// ======================================================
const canvas = document.getElementById('world-canvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
resizeBg();
window.addEventListener('resize', resizeBg);

// Game state
let gameStarted = false;
let currentSection = -1;
let worldX = 0;
const WORLD_WIDTH = 8000;
const SECTION_SPACING = WORLD_WIDTH / (SECTIONS.length - 1);
let currentBgSection = -1;

const player = { x: 0, y: 0, worldX: 0, worldY: 0, vx: 0, vy: 0, angle: 0, tilt: 0, speed: 0 };

const keys = {};
const mobileKeys = { forward:false, backward:false, up:false, down:false };

function setMobileKey(name, value) {
  mobileKeys[name] = value;
  const btn = document.getElementById(`mobile-${name === 'backward' ? 'left' : name === 'forward' ? 'right' : name}`);
  if (btn) btn.classList.toggle('active', value);
}

function attachMobileControl(buttonId, keyName) {
  const btn = document.getElementById(buttonId);
  if (!btn) return;
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    setMobileKey(keyName, true);
  });
  const release = e => { e.preventDefault && e.preventDefault(); setMobileKey(keyName, false); };
  btn.addEventListener('pointerup', release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('pointerleave', release);
}

['up', 'left', 'down', 'right'].forEach(dir => {
  const keyName = dir === 'up' ? 'up' : dir === 'down' ? 'down' : dir === 'left' ? 'backward' : 'forward';
  attachMobileControl(`mobile-${dir}`, keyName);
});

window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code === 'KeyM' && gameStarted) toggleMap();
  if(e.code === 'Escape') { closeSection(); closeMap(); }
});
window.addEventListener('keyup', e => keys[e.code] = false);

let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  document.getElementById('cursor').style.left = e.clientX + 'px';
  document.getElementById('cursor').style.top = e.clientY + 'px';
});

let trailX = 0, trailY = 0;
function updateTrail() {
  trailX += (mouseX - trailX) * 0.15;
  trailY += (mouseY - trailY) * 0.15;
  document.getElementById('cursor-trail').style.left = trailX + 'px';
  document.getElementById('cursor-trail').style.top = trailY + 'px';
}

// ======================================================
// PARTICLES
// ======================================================
const particles = [];
class Particle {
  constructor(x, y, opts={}) {
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*(opts.spread||2);
    this.vy=(Math.random()-0.5)*(opts.spread||2)-(opts.up||0);
    this.life=1; this.decay=opts.decay||(0.005+Math.random()*0.01);
    this.size=opts.size||(1+Math.random()*2);
    this.color=opts.color||`hsl(${45+Math.random()*20},80%,${60+Math.random()*20}%)`;
    this.glow=opts.glow||false; this.gravity=opts.gravity||0;
    this.twinkle=opts.twinkle||false; this.phase=Math.random()*Math.PI*2;
  }
  update() {
    this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity;
    this.life-=this.decay; this.phase+=0.05;
    if(this.twinkle) this.currentAlpha=Math.abs(Math.sin(this.phase))*this.life;
    else this.currentAlpha=this.life;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha=this.currentAlpha||this.life;
    if(this.glow){ctx.shadowBlur=12;ctx.shadowColor=this.color;}
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function spawnAmbient() {
  if(!gameStarted) return;
  for(let i=0;i<1;i++) {
    particles.push(new Particle(Math.random()*W, Math.random()*H*0.7, {
      spread:0.3, decay:0.0015, size:0.5+Math.random(),
      color:`hsl(${40+Math.random()*30},70%,${70+Math.random()*20}%)`,
      twinkle:true, glow:true
    }));
  }
}

function spawnBroomTrail() {
  if(!gameStarted) return;
  for(let i=0;i<2;i++) {
    particles.push(new Particle(player.x-60, player.y+10+(Math.random()-0.5)*8, {
      vx:-1, spread:1.5, up:0.5, decay:0.04,
      size:1+Math.random()*2,
      color:`hsl(${30+Math.random()*30},90%,${60+Math.random()*20}%)`,
      glow:true
    }));
  }
}

// ======================================================
// WORLD OBJECTS
// ======================================================
const stars = Array.from({length:150}, () => ({
  x: Math.random()*WORLD_WIDTH, y: Math.random()*(H*0.5),
  size: Math.random()*1.2, bright: Math.random(),
  phase: Math.random()*Math.PI*2, speed: 0.5+Math.random()*0.5
}));

const portals = SECTIONS.slice(1).map((s,i) => ({
  ...s,
  wx: SECTION_SPACING*(i+1),
  wy: H*0.45+Math.sin(i*0.8)*80,
  pulse:0, hovered:false, sectionIndex:i+1
}));

function worldToScreen(wx, wy) { return {x: wx - worldX + W/2, y: wy}; }

function drawStars(t) {
  stars.forEach(s => {
    const {x,y} = worldToScreen(s.x, s.y);
    if(x<-50||x>W+50) return;
    const twinkle = 0.5+0.5*Math.sin(s.phase+t*s.speed*0.001);
    ctx.save();
    ctx.globalAlpha=0.3+0.5*twinkle*s.bright;
    ctx.shadowBlur=s.size>1?6:0; ctx.shadowColor='#f0c040';
    ctx.fillStyle=`hsl(${45+s.bright*20},80%,${70+twinkle*20}%)`;
    ctx.beginPath(); ctx.arc(x,y,s.size*(0.7+0.3*twinkle),0,Math.PI*2); ctx.fill();
    ctx.restore();
    s.phase+=0.01;
  });
}

function drawPortals(t) {
  portals.forEach(p => {
    const {x,y} = worldToScreen(p.wx, p.wy);
    if(x<-200||x>W+200) return;
    const dist = Math.hypot(mouseX-x, mouseY-y);
    p.hovered = dist < 80;
    p.pulse = (p.pulse+0.03)%(Math.PI*2);
    const pulseMult = 1+Math.sin(p.pulse)*0.1;
    const glowSize = p.hovered ? 100 : 70;

    const glow = ctx.createRadialGradient(x,y,0,x,y,glowSize*pulseMult);
    glow.addColorStop(0, p.color+'44'); glow.addColorStop(0.5, p.color+'22'); glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;
    ctx.beginPath(); ctx.arc(x,y,glowSize*pulseMult,0,Math.PI*2); ctx.fill();

    ctx.save();
    ctx.strokeStyle=p.color+(p.hovered?'cc':'66');
    ctx.lineWidth=p.hovered?3:2;
    ctx.shadowBlur=p.hovered?30:15; ctx.shadowColor=p.color;
    for(let r=0;r<3;r++) {
      ctx.globalAlpha=1-r*0.25;
      ctx.beginPath(); ctx.arc(x,y,(40+r*15)*pulseMult,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    ctx.globalAlpha=p.hovered?1:0.6;
    ctx.fillStyle=p.color;
    ctx.font=`${p.hovered?20:18}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=10; ctx.shadowColor=p.color;
    ctx.fillText(p.icon,x,y);
    ctx.font=`bold ${p.hovered?13:11}px 'Cinzel',serif`;
    ctx.fillStyle=p.hovered?'#ffe066':p.color;
    ctx.shadowBlur=p.hovered?20:5;
    ctx.fillText(p.name.toUpperCase(),x,y+55);
    ctx.globalAlpha=0.6;
    ctx.font='10px Cinzel';
    ctx.fillText('[ ENTER ]',x,y+70);
    ctx.restore();

    if(p.hovered && Math.random()<0.4) {
      particles.push(new Particle(x+(Math.random()-0.5)*60, y+(Math.random()-0.5)*60, {
        spread:2, up:1, decay:0.03, size:1+Math.random()*2, color:p.color, glow:true
      }));
    }
  });
}

// ======================================================
// BROOMSTICK
// ======================================================
function drawBroomstick(t) {
  const px=player.x, py=player.y;
  ctx.save();
  ctx.translate(px,py);
  ctx.rotate(player.tilt);

  const riderGlow=ctx.createRadialGradient(0,-30,0,0,-30,50);
  riderGlow.addColorStop(0,'rgba(240,192,64,0.3)'); riderGlow.addColorStop(1,'transparent');
  ctx.fillStyle=riderGlow; ctx.beginPath(); ctx.arc(0,-30,50,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='#8b5a2b'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.shadowBlur=10; ctx.shadowColor='#f0c040';
  ctx.beginPath(); ctx.moveTo(-75,8); ctx.lineTo(55,5); ctx.stroke();

  ctx.shadowColor='#f0a020'; ctx.shadowBlur=15;
  for(let i=0;i<8;i++) {
    const bx=50+i*8;
    ctx.strokeStyle=`rgba(200,160,80,${0.9-i*0.08})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(bx,3); ctx.lineTo(bx+15,3+(i%2)*8-4); ctx.stroke();
  }

  ctx.shadowBlur=0;
  ctx.fillStyle='#1a0a0a'; ctx.beginPath(); ctx.ellipse(-10,-10,12,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0d0020'; ctx.beginPath(); ctx.moveTo(-22,5); ctx.lineTo(5,5); ctx.lineTo(8,20); ctx.lineTo(-25,20); ctx.fill();
  ctx.fillStyle='#c8a080'; ctx.beginPath(); ctx.arc(-10,-28,10,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0a0010'; ctx.beginPath(); ctx.moveTo(-22,-28); ctx.lineTo(2,-28); ctx.lineTo(-5,-52); ctx.closePath(); ctx.fill();
  ctx.fillRect(-24,-30,28,4);

  if(player.speed>4) {
    ctx.globalAlpha=(player.speed-4)/4*0.5;
    const boostGlow=ctx.createRadialGradient(-40,0,0,-40,0,80);
    boostGlow.addColorStop(0,'#ff8040'); boostGlow.addColorStop(1,'transparent');
    ctx.fillStyle=boostGlow; ctx.beginPath(); ctx.arc(-40,0,80,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ======================================================
// SECTION UI
// ======================================================
function openSection(sectionId) {
  const s = SECTIONS.find(x=>x.id===sectionId);
  if(!s||!s.body) return;
  const overlay=document.getElementById('section-overlay');
  const panel=document.getElementById('section-panel');
  document.getElementById('panel-title').textContent=s.title||s.name;
  document.getElementById('panel-subtitle').textContent=s.subtitleText||s.subtitle||'';
  document.getElementById('panel-body').innerHTML=PANEL_CONTENTS[s.body]||'';
  overlay.style.display='flex';
  createMagicalTeleportation(); // Enhanced magical teleportation effect
  requestAnimationFrame(()=>{
    overlay.style.background='rgba(0,0,0,0.8)';
    overlay.style.backdropFilter='blur(12px)';
    setTimeout(()=>panel.classList.add('open'),50);
  });
  document.getElementById('cursor').classList.remove('hover');
  showToast('Press ESC to exit the chamber');
}

function closeSection() {
  const overlay=document.getElementById('section-overlay');
  const panel=document.getElementById('section-panel');
  panel.classList.remove('open');
  overlay.style.background='rgba(0,0,0,0)';
  overlay.style.backdropFilter='blur(0px)';
  setTimeout(()=>overlay.style.display='none',500);
}

// ======================================================
// MARAUDER'S MAP
// ======================================================
function buildMap() {
  const mapNodes=document.getElementById('map-nodes');
  const footprints=document.getElementById('footprints');
  mapNodes.innerHTML='';
  let fps='';
  for(let i=0;i<40;i++){
    const t2=i/39; const x=60+t2*820; const y=330+Math.sin(t2*Math.PI*3)*30;
    fps+=`<ellipse cx="${x+(Math.random()-0.5)*8}" cy="${y+(Math.random()-0.5)*6}" rx="4" ry="2.5" fill="#a8862a" opacity="${0.2+Math.random()*0.3}" transform="rotate(${Math.random()*20-10},${x},${y})"/>`;
  }
  footprints.innerHTML=fps;
  SECTIONS.forEach((s,i)=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    g.onclick=()=>{teleportTo(i);closeMap();};
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',s.mapX);circle.setAttribute('cy',s.mapY);
    circle.setAttribute('r','22');circle.setAttribute('fill',s.color+'22');
    circle.setAttribute('stroke',s.color);circle.setAttribute('stroke-width','2');
    const icon=document.createElementNS('http://www.w3.org/2000/svg','text');
    icon.setAttribute('x',s.mapX);icon.setAttribute('y',s.mapY+6);
    icon.setAttribute('text-anchor','middle');icon.setAttribute('font-size','16');
    icon.textContent=s.icon;
    const label=document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x',s.mapX);label.setAttribute('y',s.mapY+40);
    label.setAttribute('text-anchor','middle');label.setAttribute('font-size','9');
    label.setAttribute('font-family','Cinzel,serif');label.setAttribute('fill','#a8862a');
    label.textContent=s.name.toUpperCase();
    g.appendChild(circle);g.appendChild(icon);g.appendChild(label);
    if(i===currentSection){
      const pulse=document.createElementNS('http://www.w3.org/2000/svg','circle');
      pulse.setAttribute('cx',s.mapX);pulse.setAttribute('cy',s.mapY);
      pulse.setAttribute('r','8');pulse.setAttribute('fill','#f0c040');
      pulse.innerHTML='<animate attributeName="r" values="8;16;8" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>';
      g.appendChild(pulse);
    }
    mapNodes.appendChild(g);
  });
}

function toggleMap() {
  const overlay=document.getElementById('map-overlay');
  if(overlay.classList.contains('visible')) closeMap();
  else { buildMap(); overlay.classList.add('visible'); }
}
function closeMap() { document.getElementById('map-overlay').classList.remove('visible'); }

function teleportTo(sectionIndex) {
  worldX=SECTION_SPACING*sectionIndex;
  player.worldX=worldX;
  updateProgressDots();
  showToast('⚡ Teleported to '+SECTIONS[sectionIndex].name);
}

// ======================================================
// PROGRESS DOTS
// ======================================================
function buildProgressDots() {
  const bar=document.getElementById('progress-bar');
  bar.innerHTML='';
  SECTIONS.forEach((s,i)=>{
    const dot=document.createElement('div');
    dot.className='prog-dot'; dot.title=s.name;
    dot.onclick=()=>teleportTo(i);
    bar.appendChild(dot);
  });
}
buildProgressDots();

function updateProgressDots() {
  const idx=Math.round(worldX/SECTION_SPACING);
  currentSection=Math.max(0,Math.min(idx,SECTIONS.length-1));
  document.querySelectorAll('.prog-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSection));
  const label=document.getElementById('section-label');
  label.textContent=SECTIONS[currentSection]?.name||'';
  label.classList.add('visible');
  clearTimeout(label._t);
  label._t=setTimeout(()=>label.classList.remove('visible'),2000);
}

// ======================================================
// TOAST
// ======================================================
function showToast(msg,dur=3000) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

function createStartParticles() {

// ======================================================
// MAGICAL TELEPORTATION EFFECT FOR MARAUDER'S MAP
// ======================================================
function createMagicalTeleportation() {
  // Create a central magical portal effect
  const centerX = W / 2;
  const centerY = H / 2;

  // Magical portal swirl - particles spiraling outward
  for(let i = 0; i < 25; i++) {
    setTimeout(() => {
      const angle = (i / 25) * Math.PI * 4; // Multiple rotations
      const radius = 20 + Math.random() * 100;
      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + Math.sin(angle) * radius;

      particles.push(new Particle(x, y, {
        vx: Math.cos(angle) * 2, // Spiral outward
        vy: Math.sin(angle) * 2,
        spread: 0,
        decay: 0.008,
        size: 2 + Math.random() * 3,
        color: `rgba(${200 + Math.random() * 55}, ${150 + Math.random() * 100}, ${255}, 0.8)`,
        glow: true,
        gravity: 0
      }));
    }, i * 30);
  }

  // Magical runes/symbols appearing in a circle
  const runes = ['✨', '🔮', '⚡', '🌟', '💫', '🪄', '🎭', '🔥'];
  for(let i = 0; i < 8; i++) {
    setTimeout(() => {
      const angle = (i / 8) * Math.PI * 2;
      const radius = 150;
      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + Math.sin(angle) * radius;

      // Create rune particles that float upward
      particles.push(new Particle(x, y, {
        vx: (Math.random() - 0.5) * 0.5,
        vy: -1 - Math.random() * 0.5,
        spread: 0,
        decay: 0.003,
        size: 4 + Math.random() * 4,
        color: `rgba(${220 + Math.random() * 35}, ${180 + Math.random() * 75}, ${255}, 0.9)`,
        glow: true,
        gravity: -0.002
      }));
    }, i * 100 + 200);
  }

  // Enhanced golden bubbles with more variety
  setTimeout(() => {
    const bubbleCount = 12 + Math.floor(Math.random() * 8);
    for(let i = 0; i < bubbleCount; i++) {
      setTimeout(() => {
        particles.push(new Particle(
          centerX + (Math.random() - 0.5) * 400,
          H - 100 + Math.random() * 100,
          {
            vx: (Math.random() - 0.5) * 0.8,
            vy: -0.4 - Math.random() * 0.6,
            spread: 0,
            decay: 0.0015,
            size: 4 + Math.random() * 6,
            color: `rgba(${240 + Math.random() * 15}, ${192 + Math.random() * 63}, ${64 + Math.random() * 191}, 0.75)`,
            glow: true,
            gravity: -0.001
          }
        ));
      }, i * 120);
    }
  }, 300);

  // Screen shake effect
  let shakeIntensity = 8;
  const shakeDuration = 600;
  const startTime = Date.now();

  function shakeScreen() {
    const elapsed = Date.now() - startTime;
    if (elapsed < shakeDuration) {
      const progress = elapsed / shakeDuration;
      const currentIntensity = shakeIntensity * (1 - progress);

      const canvas = document.getElementById('world-canvas');
      canvas.style.transform = `translate(${Math.random() * currentIntensity - currentIntensity/2}px, ${Math.random() * currentIntensity - currentIntensity/2}px)`;

      requestAnimationFrame(shakeScreen);
    } else {
      const canvas = document.getElementById('world-canvas');
      canvas.style.transform = 'none';
    }
  }
  shakeScreen();

  // VERTICAL TELEPORTATION HOLE EFFECT
  createVerticalTeleportationHole(centerX, centerY);
}

function createVerticalTeleportationHole(centerX, centerY) {
  // Create a vertical tunnel/hole effect that expands and contracts
  const tunnelDuration = 800;
  const startTime = Date.now();

  function animateTunnel() {
    const elapsed = Date.now() - startTime;
    const progress = Math.min(elapsed / tunnelDuration, 1);

    // Create expanding/contracting tunnel effect
    const tunnelRadius = 20 + (progress < 0.5 ? progress * 200 : (1 - progress) * 200);
    const particleCount = Math.floor(15 + progress * 20);

    for(let i = 0; i < particleCount; i++) {
      const angle = (i / particleCount) * Math.PI * 2;
      const depth = Math.sin(progress * Math.PI * 2) * 100; // Oscillating depth
      const radius = tunnelRadius + Math.sin(angle * 3 + progress * 4) * 10; // Wavy edges

      const x = centerX + Math.cos(angle) * radius;
      const y = centerY + depth; // Vertical movement

      // Create tunnel particles with depth-based colors
      const depthFactor = Math.abs(depth) / 100;
      particles.push(new Particle(x, y, {
        vx: Math.cos(angle) * 0.5 + (Math.random() - 0.5) * 0.2,
        vy: (depth > 0 ? -0.3 : 0.3) + (Math.random() - 0.5) * 0.2,
        spread: 0,
        decay: 0.02,
        size: 2 + Math.random() * 3 + depthFactor * 2,
        color: `rgba(${100 + depthFactor * 155}, ${50 + depthFactor * 100}, ${200 + depthFactor * 55}, ${0.6 - depthFactor * 0.3})`,
        glow: true,
        gravity: 0
      }));
    }

    // Add inner tunnel particles for depth effect
    for(let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const innerRadius = tunnelRadius * 0.3;
      const depth = Math.sin(progress * Math.PI * 3 + i) * 80;

      const x = centerX + Math.cos(angle) * innerRadius;
      const y = centerY + depth;

      particles.push(new Particle(x, y, {
        vx: (Math.random() - 0.5) * 0.8,
        vy: (Math.random() - 0.5) * 0.8,
        spread: 0,
        decay: 0.015,
        size: 1 + Math.random() * 2,
        color: `rgba(${255}, ${215 + Math.random() * 40}, ${0}, 0.9)`,
        glow: true,
        gravity: 0
      }));
    }

    if (progress < 1) {
      setTimeout(animateTunnel, 50);
    }
  }

  animateTunnel();
}

function createGoldenBubbles() {
  // Create 8-12 golden bubbles that float up slowly
  const bubbleCount = 8 + Math.floor(Math.random() * 5);
  for(let i = 0; i < bubbleCount; i++) {
    setTimeout(() => {
      particles.push(new Particle(
        W/2 + (Math.random() - 0.5) * 300, // Center area with some spread
        H - 50, // Start near bottom
        {
          vx: (Math.random() - 0.5) * 0.5, // Slow horizontal drift
          vy: -0.3 - Math.random() * 0.4,   // Float upward slowly

          size: 3 + Math.random() * 4, // Varied bubble sizes
          color: `rgba(240, 192, 64, 0.7)`, // Golden with 70% opacity

function beginJourney() {
  const overlay=document.getElementById('start-overlay');
  overlay.style.opacity='0';
  overlay.style.transition='opacity 1.5s ease';
  setTimeout(()=>{
    overlay.style.display='none';
    gameStarted=true;
    player.x=W/2; player.y=H/2;

// ======================================================
// CLICK HANDLER
// ======================================================
canvas.addEventListener('click', e => {
  if(!gameStarted) return;
  portals.forEach(p => {
    const {x,y}=worldToScreen(p.wx,p.wy);
    if(Math.hypot(e.clientX-x,e.clientY-y)<80) {
      openSection(p.id);
      for(let i=0;i<20;i++) {
        particles.push(new Particle(x,y,{spread:5,decay:0.03,size:2+Math.random()*3,color:p.color,glow:true}));
      }
    }
  });
});

canvas.addEventListener('mousemove', e => {
  if(!gameStarted) return;
  let hovering=false;
  portals.forEach(p=>{
    const {x,y}=worldToScreen(p.wx,p.wy);
    if(Math.hypot(e.clientX-x,e.clientY-y)<80) hovering=true;
  });
  const cur=document.getElementById('cursor');
  if(hovering) cur.classList.add('hover'); else cur.classList.remove('hover');
});

// ======================================================
// MAIN GAME LOOP
// ======================================================
let lastTime=0;
function gameLoop(t) {
  const dt=Math.min(t-lastTime,50); lastTime=t;

  // Draw Hogwarts parallax background (always, on its own canvas)
  drawHogwarts(t);

  ctx.clearRect(0,0,W,H);

  if(!gameStarted) {
    requestAnimationFrame(gameLoop);
    return;
  }

  updateTrail();

  // INPUT
  const isBoosting=keys['Space'];
  const maxSpeed=isBoosting?50:18;
  const accel=1.5;

  if(keys['ArrowLeft']||keys['KeyA']||mobileKeys.backward) player.vx-=accel;
  if(keys['ArrowRight']||keys['KeyD']||mobileKeys.forward) player.vx+=accel;
  if(keys['ArrowUp']||keys['KeyW']||mobileKeys.up) player.vy-=accel*0.7;
  if(keys['ArrowDown']||keys['KeyS']||mobileKeys.down) player.vy+=accel*0.7;

  player.vx=Math.max(-maxSpeed,Math.min(maxSpeed,player.vx));
  player.vy=Math.max(-maxSpeed*0.5,Math.min(maxSpeed*0.5,player.vy));
  player.vx*=0.92; player.vy*=0.95;

  player.worldX+=player.vx;
  player.worldX=Math.max(0,Math.min(WORLD_WIDTH,player.worldX));
  worldX=player.worldX;

  player.y+=player.vy;
  player.y=Math.max(H*0.2,Math.min(H*0.75,player.y));

  player.tilt=player.vx*0.04;
  player.speed=Math.abs(player.vx);
  player.x=W/2+(mouseX-W/2)*0.1;

  document.getElementById('speed-fill').style.height=`${Math.min(100,player.speed/maxSpeed*100)}%`;

  updateProgressDots();

  // Draw sparse world-space stars on top of bg
  drawStars(t);

  // Draw portals
  drawPortals(t);

  // ---- Realistic Owls flying between sections ----
  const numFlyingOwls = 2;
  for(let o=0;o<numFlyingOwls;o++) {
    // More realistic flight timing with varied speeds
    const baseSpeed = o === 0 ? 0.00008 : 0.00012; // Different speeds for realism
    const owlT = ((t * baseSpeed + o * 0.6) % 1);

    // Fly between sections with more natural path
    const startSection = o === 0 ? 0 : 3; // Owl 1: Platform to Skills, Owl 2: Projects to Journey
    const endSection = o === 0 ? 3 : 7;
    const startX = startSection * SECTION_SPACING;
    const endX = endSection * SECTION_SPACING;
    const flightDistance = endX - startX;

    const owlWorldX = startX + owlT * flightDistance;
    const owlX = owlWorldX - worldX + W/2; // Convert to screen coordinates

    // More realistic vertical movement - gentle waves with occasional dives
    const waveAmplitude = 30 + Math.sin(t * 0.0005 + o * Math.PI) * 20;
    const baseHeight = H * (0.15 + o * 0.1); // Different heights for each owl
    const owlY = baseHeight + Math.sin(owlT * Math.PI * 4) * waveAmplitude;

    // Only draw if owl is visible on screen
    if(owlX < -50 || owlX > W + 50) continue;

    ctx.save();

    // Wing flapping animation - subtle opacity changes to simulate wings
    const flapCycle = Math.sin(t * 0.008 + o * Math.PI * 0.8) * 0.25 + 0.75;
    ctx.globalAlpha = 0.3 + flapCycle * 0.4;

    // Size variation based on distance (depth perception)
    const scale = 0.7 + Math.sin(owlT * Math.PI) * 0.3;
    ctx.font = `${Math.floor(24 * scale)}px serif`;

    // Slight rotation for more realistic flight attitude
    const tilt = Math.sin(owlT * Math.PI * 6) * 0.15;
    ctx.translate(owlX, owlY);
    ctx.rotate(tilt);

    // Add subtle shadow for depth
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 3;
    ctx.shadowOffsetY = 2;

    // Use realistic owl drawing instead of emoji
    ctx.save();
    ctx.scale(scale, scale);
    ctx.rotate(-tilt); // Counter the parent rotation for proper wing flapping
    drawFlyingOwl(ctx, 0, 0, t, o);
    ctx.restore();

    ctx.restore();
  }

  // Particles
  spawnAmbient();
  if(Math.abs(player.vx)>0.5) spawnBroomTrail();

  for(let i=particles.length-1;i>=0;i--) {
    particles[i].update(); particles[i].draw(ctx);
    if(particles[i].life<=0) particles.splice(i,1);
  }

  drawBroomstick(t);

  if(isBoosting) {
    ctx.save(); ctx.fillStyle='rgba(255,128,64,0.04)'; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

document.getElementById('map-btn').addEventListener('click', toggleMap);
